version: "3.9"

services:

  api:
    build: .

    container_name: expense_api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16

    container_name: expense_postgres

    environment:
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: expense_password
      POSTGRES_DB: expense_tracker

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: expense_redis

    ports:
      - "6379:6379"

volumes:
  postgres_data:
